<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Money — LifeTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body data-page="money.html">
<script src="script.js"></script>
<script>
buildShell('Money');
const user = DB.currentUser();
let data = DB.getData(user.id);
const CATS = ['Food', 'Travel', 'Shopping', 'Bills', 'Others'];
const CAT_COLORS = { Food:'#22C55E', Travel:'#2563EB', Shopping:'#F59E0B', Bills:'#EF4444', Others:'#64748B', Salary:'#22C55E', Other:'#64748B' };

function render(){
  const todayT = todaysExpense(data);
  const monthT = monthExpense(data);
  const bal = balance(data);
  const ym = todayStr().slice(0,7);
  const monthTx = data.transactions.filter(t => t.date.startsWith(ym) && t.type==='expense');
  const catTotals = CATS.map(c => ({ cat: c, total: monthTx.filter(t=>t.category===c).reduce((s,t)=>s+Number(t.amount),0) }));
  const maxCat = Math.max(1, ...catTotals.map(c=>c.total));
  const sortedTx = [...data.transactions].sort((a,b)=>b.date.localeCompare(a.date));

  qs('#pageContent').innerHTML = `
    <div class="grid grid-4 mb-16 stagger">
      <div class="card stat-card"><div class="stat-top"><span class="stat-label">Today's spending</span><div class="stat-icon bg-danger">${ICONS.money}</div></div><div class="stat-value">${fmtMoney(todayT)}</div></div>
      <div class="card stat-card"><div class="stat-top"><span class="stat-label">Monthly spending</span><div class="stat-icon bg-warning">${ICONS.money}</div></div><div class="stat-value">${fmtMoney(monthT)}</div></div>
      <div class="card stat-card"><div class="stat-top"><span class="stat-label">Current balance</span><div class="stat-icon bg-success">${ICONS.money}</div></div><div class="stat-value" style="color:${bal>=0?'var(--success)':'var(--danger)'}">${fmtMoney(bal)}</div></div>
      <div class="card flex flex-col" style="justify-content:center;gap:8px;">
        <button class="btn btn-success btn-block" id="addIncomeBtn">${ICONS.plus} Add income</button>
        <button class="btn btn-danger btn-block" id="addExpenseBtn">${ICONS.plus} Add expense</button>
      </div>
    </div>

    <div class="grid grid-2 mb-16">
      <div class="card">
        <div class="section-title">Category-wise spending <span class="muted">this month</span></div>
        ${catTotals.every(c=>c.total===0) ? `<p class="text-sm muted">No expenses logged this month.</p>` : catTotals.map(c => `
          <div style="margin-bottom:12px;">
            <div class="flex justify-between text-sm" style="margin-bottom:4px;"><b>${c.cat}</b><span class="muted">${fmtMoney(c.total)}</span></div>
            <div class="pbar"><div style="width:${(c.total/maxCat*100)}%;background:${CAT_COLORS[c.cat]}"></div></div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="section-title">All transactions <span class="muted">${data.transactions.length} total</span></div>
        <div class="table-wrap" style="max-height:320px;overflow-y:auto;">
        ${sortedTx.length ? `<table><tbody>
          ${sortedTx.map(t => `<tr>
            <td>
              <div style="font-weight:700;font-size:13.5px;">${t.category}${t.note ? ' · '+t.note : ''}</div>
              <div class="text-sm muted">${fmtDateNice(t.date)}</div>
            </td>
            <td style="text-align:right;font-weight:800;color:${t.type==='income'?'var(--success)':'var(--danger)'}">${t.type==='income'?'+':'-'}${fmtMoney(t.amount)}</td>
            <td class="row-actions"><button class="btn btn-outline btn-sm" data-del="${t.id}">${ICONS.trash}</button></td>
          </tr>`).join('')}
        </tbody></table>` : `<div class="empty-state">${ICONS.empty}<b>No transactions yet</b><span>Add your first income or expense.</span></div>`}
        </div>
      </div>
    </div>
  `;

  qs('#addIncomeBtn').addEventListener('click', () => openTxModal('income'));
  qs('#addExpenseBtn').addEventListener('click', () => openTxModal('expense'));
  qsa('[data-del]').forEach(b => b.addEventListener('click', () => {
    confirmAction('Delete this transaction?', () => {
      data.transactions = data.transactions.filter(t => t.id !== b.dataset.del);
      DB.saveData(user.id, data);
      render();
      toast('Transaction deleted');
    });
  }));
}

function openTxModal(type){
  let bd = qs('#txModal');
  if (!bd) {
    bd = document.createElement('div');
    bd.id = 'txModal';
    bd.className = 'modal-backdrop';
    document.body.appendChild(bd);
    bd.addEventListener('click', (e) => { if (e.target === bd) closeModal('txModal'); });
  }
  const cats = type === 'income' ? ['Salary','Other'] : CATS;
  bd.innerHTML = `<div class="modal">
    <div class="modal-head"><h3>Add ${type}</h3><button class="close-x" onclick="closeModal('txModal')">✕</button></div>
    <form id="txForm">
      <div class="field"><label>Amount</label><input class="input" type="number" min="0" step="0.01" id="txAmount" placeholder="e.g. 500" required></div>
      <div class="field"><label>Category</label><select class="input" id="txCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field"><label>Date</label><input class="input" type="date" id="txDate" value="${todayStr()}"></div>
      <div class="field"><label>Note (optional)</label><input class="input" id="txNote" placeholder="e.g. Groceries"></div>
      <button class="btn ${type==='income'?'btn-success':'btn-danger'} btn-block" type="submit">Add ${type}</button>
    </form>
  </div>`;
  openModal('txModal');
  qs('#txForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const amount = parseFloat(qs('#txAmount').value);
    if (!amount || amount <= 0) return;
    data.transactions.push({ id: uid(), date: qs('#txDate').value || todayStr(), type, category: qs('#txCat').value, amount, note: qs('#txNote').value.trim() });
    DB.saveData(user.id, data);
    closeModal('txModal');
    render();
    toast(`${type === 'income' ? 'Income' : 'Expense'} added`, 'success');
  });
}

render();
</script>
</body>
</html>
