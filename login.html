<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Log in — LifeTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand"><div class="brand-mark">PL</div><span style="font-family:var(--font-display);font-weight:800;font-size:18px;">LifeTrack</span></div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Log in to see today's score.</p>

    <form id="loginForm" novalidate>
      <div class="field" id="emailField">
        <label for="email">Email address</label>
        <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
        <div class="field-error">Enter a valid email address.</div>
      </div>
      <div class="field" id="passField">
        <label for="password">Password</label>
        <div class="input-group">
          <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="input-group-btn" id="togglePass"></button>
        </div>
        <div class="field-error">Password must be at least 6 characters.</div>
      </div>
      <div class="flex justify-between items-center mb-16" style="margin-top:-6px;">
        <label class="check-row"><input type="checkbox" id="remember" checked> Remember me</label>
        <a href="forgot-password.html" style="font-size:13px;font-weight:700;color:var(--primary);">Forgot password?</a>
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="loginBtn">Log in</button>
    </form>

    <div class="divider-line">or</div>
    <button class="btn btn-outline btn-block" id="demoBtn">Use demo account</button>

    <p class="auth-footer">Don't have an account? <a href="register.html">Create one</a></p>
  </div>
</div>
<script src="script.js"></script>
<script>
// simple eye icon set
const EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A10.6 10.6 0 0 1 12 4c7 0 11 8 11 8a21.7 21.7 0 0 1-3.22 4.36M1 1l22 22"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>';
qs('#togglePass').innerHTML = EYE;
qs('#togglePass').addEventListener('click', () => {
  const p = qs('#password');
  const showing = p.type === 'text';
  p.type = showing ? 'password' : 'text';
  qs('#togglePass').innerHTML = showing ? EYE : EYE_OFF;
});

function setInvalid(fieldId, invalid){ qs('#'+fieldId).classList.toggle('invalid', invalid); }

qs('#loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const email = qs('#email').value.trim();
  const pass = qs('#password').value;
  const emailOk = /^\S+@\S+\.\S+$/.test(email);
  const passOk = pass.length >= 6;
  setInvalid('emailField', !emailOk);
  setInvalid('passField', !passOk);
  if (!emailOk || !passOk) return;

  const user = DB.getUsers().find(u => u.email.toLowerCase() === email.toLowerCase());
  if (!user || user.password !== pass) {
    toast('Incorrect email or password', 'danger');
    setInvalid('passField', true);
    qs('#passField .field-error').textContent = 'Incorrect email or password.';
    return;
  }
  DB.setSession(user.id);
  toast('Welcome back, ' + user.name.split(' ')[0] + '!', 'success');
  setTimeout(() => location.href = 'dashboard.html', 400);
});

qs('#demoBtn').addEventListener('click', () => {
  const user = DB.getUsers().find(u => u.email === 'demo@example.com');
  DB.setSession(user.id);
  toast('Logged in as demo account', 'success');
  setTimeout(() => location.href = 'dashboard.html', 400);
});

if (DB.currentUser()) location.href = 'dashboard.html';
</script>
</body>
</html>
