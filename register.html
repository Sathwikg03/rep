<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Create account — LifeTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand"><div class="brand-mark">PL</div><span style="font-family:var(--font-display);font-weight:800;font-size:18px;">LifeTrack</span></div>
    <h2 class="auth-title">Create your account</h2>
    <p class="auth-sub">Takes less than a minute. Your data stays on this device.</p>

    <form id="regForm" novalidate>
      <div class="field" id="nameField">
        <label for="name">Full name</label>
        <input class="input" id="name" placeholder="Aarav Mehta" autocomplete="name">
        <div class="field-error">Please enter your name.</div>
      </div>
      <div class="field" id="emailField">
        <label for="email">Email address</label>
        <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
        <div class="field-error">Enter a valid email address.</div>
      </div>
      <div class="field" id="passField">
        <label for="password">Password</label>
        <div class="input-group">
          <input class="input" type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
          <button type="button" class="input-group-btn" id="togglePass"></button>
        </div>
        <div class="field-error">Password must be at least 6 characters.</div>
      </div>
      <div class="field" id="confirmField">
        <label for="confirm">Confirm password</label>
        <input class="input" type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password">
        <div class="field-error">Passwords don't match.</div>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>
<script src="script.js"></script>
<script>
const EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A10.6 10.6 0 0 1 12 4c7 0 11 8 11 8a21.7 21.7 0 0 1-3.22 4.36M1 1l22 22"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>';
qs('#togglePass').innerHTML = EYE;
qs('#togglePass').addEventListener('click', () => {
  const p = qs('#password');
  const showing = p.type === 'text';
  p.type = showing ? 'password' : 'text';
  qs('#togglePass').innerHTML = showing ? EYE : EYE_OFF;
});

function setInvalid(fieldId, invalid, msg){
  const f = qs('#'+fieldId);
  f.classList.toggle('invalid', invalid);
  if (msg) qs('.field-error', f).textContent = msg;
}

qs('#regForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const name = qs('#name').value.trim();
  const email = qs('#email').value.trim();
  const pass = qs('#password').value;
  const confirm = qs('#confirm').value;

  const nameOk = name.length >= 2;
  const emailOk = /^\S+@\S+\.\S+$/.test(email);
  const passOk = pass.length >= 6;
  const confirmOk = pass === confirm && confirm.length > 0;

  setInvalid('nameField', !nameOk);
  setInvalid('emailField', !emailOk);
  setInvalid('passField', !passOk);
  setInvalid('confirmField', !confirmOk);
  if (!nameOk || !emailOk || !passOk || !confirmOk) return;

  const users = DB.getUsers();
  if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
    setInvalid('emailField', true, 'An account with this email already exists.');
    return;
  }
  const newUser = { id: uid(), name, email, password: pass, createdAt: Date.now() };
  users.push(newUser);
  DB.saveUsers(users);
  DB.getData(newUser.id); // initialize empty data set
  DB.setSession(newUser.id);
  toast('Account created — welcome!', 'success');
  setTimeout(() => location.href = 'dashboard.html', 500);
});

if (DB.currentUser()) location.href = 'dashboard.html';
</script>
</body>
</html>
